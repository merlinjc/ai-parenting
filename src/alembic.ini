# Alembic 配置文件
#
# AI Parenting 项目数据库迁移配置
# 运行方式：cd src && alembic upgrade head

[alembic]
# 迁移脚本目录
script_location = alembic

# 迁移文件命名模板
file_template = %%(rev)s_%%(slug)s

# 数据库 URL 从 env.py 中通过代码设定（读取 AIP_DATABASE_URL 环境变量）
# 此处占位，实际值由 env.py 覆盖
sqlalchemy.url = sqlite+aiosqlite:///./ai_parenting_dev.db

# 格式化输出
prepend_sys_path = .

[post_write_hooks]
# 可选：自动格式化生成的迁移脚本
# hooks = ruff
# ruff.type = console_scripts
# ruff.entrypoint = ruff
# ruff.options = format REVISION_SCRIPT_FILENAME

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
